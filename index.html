<!DOCTYPE html>
<html>
<title>HTML Tutorial</title>
<style>
	body {
	background-color:#bcc8cc;
	text-align: center;
	color: #0007E6;
	font-family: Arial, sans-serif;
	}

	img.sizing {
	max-width: 100%;
	max-height: 600px;
	height: auto;
	display: block;
	margin: auto;
	}


</style>
<body>
	
	<!-- link to click on that goes to A1 subfolder html -->
	<a href="/A1">A1 card</a>
	<img src="RDWlogo.png" alt="swag" width="600" height="600">
	<!-- header is bigger -->
	<h1>Ratdoodle's World</h1>
	<!-- paragraph text -->
	<p>This is a paragraph.</p>
	<!-- loads image from og folder -->
	<div style="overflow: hidden; height: 50%;">
    		<div style="transform: translateY(-25%);">
        		<img src="doodle - 0018.png" alt="swag" class="sizing">
    		</div>
	</div>
	
</body>
</html>
