<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Robot Runner</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@700&display=swap');

html, body {
    margin:0;
    padding:0;
    overflow:hidden;
    background:black;
}

canvas {
    display:block;
    margin:auto;
    image-rendering:pixelated;
}

#explosion {

    position:absolute;

    left:0;
    top:0;

    width:900px;
    height:450px;

    display:none;

    z-index:10;

    pointer-events:none;

    image-rendering:pixelated;
}

</style>

</head>

<body>

<img id="explosion" src="explode.gif">

<canvas id="game" width="900" height="450"></canvas>


<script>


const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

ctx.imageSmoothingEnabled=false;


// FONT

ctx.font="28px 'Baloo 2', Arial";


// IMAGES

const run1=new Image();
run1.src="run1.png";


const run2=new Image();
run2.src="run2.png";


const jumpImg=new Image();
jumpImg.src="jump.png";


const robot=new Image();
robot.src="robot.png";


const sky=new Image();
sky.src="sky.png";


const groundImg=new Image();
groundImg.src="ground.png";



const explosion=document.getElementById("explosion");



// VARIABLES

const gravity=0.8;

const ground=310;


let score=0;

let speed=7;


let gameOver=false;

let explosionPlaying=false;


let obstacles=[];

let spawnTimer=0;


let gameRunning=false;



// ROBOT ALPHA DATA

let robotPixels=[];



// PLAYER

const player={


    x:120,

    y:ground,


    width:120,

    height:120,


    velY:0,

    jumping:false,


    frame:0,

    frameTimer:0,



    draw(){


        let img;


        if(this.jumping){

            img=jumpImg;

        }
        else{

            img=this.frame===0 ? run1 : run2;

        }



        ctx.save();


        ctx.imageSmoothingEnabled=false;



        ctx.translate(
            this.x+this.width,
            this.y
        );


        ctx.scale(-1,1);



        ctx.drawImage(
            img,
            0,
            0,
            this.width,
            this.height
        );


        ctx.restore();


    },



    update(){


        if(this.jumping){


            this.velY+=gravity;


            this.y+=this.velY;



            if(this.y>=ground){


                this.y=ground;

                this.velY=0;

                this.jumping=false;


            }


        }
        else{


            this.frameTimer++;


            if(this.frameTimer>8){


                this.frameTimer=0;


                this.frame=this.frame===0?1:0;


            }

        }


    },



    jump(){


        if(!this.jumping){


            this.jumping=true;


            // slightly higher jump

            this.velY=-18;


        }


    }


};

// CREATE ROBOT ALPHA HITBOX

robot.onload=function(){


    const temp=document.createElement("canvas");

    temp.width=robot.width;

    temp.height=robot.height;


    const tctx=temp.getContext("2d");


    tctx.drawImage(robot,0,0);



    const data=tctx.getImageData(
        0,
        0,
        robot.width,
        robot.height
    ).data;



    robotPixels=[];



    for(let y=0;y<robot.height;y++){


        for(let x=0;x<robot.width;x++){


            let alpha=data[
                (y*robot.width+x)*4+3
            ];



            if(alpha>10){


                robotPixels.push({
                    x:x,
                    y:y
                });


            }


        }


    }


};




// ALPHA COLLISION

function robotCollision(player, obstacle){



    for(let p of robotPixels){



        // shrink hitbox 2%

        let shrink=0.02;


        let rx =
        obstacle.x +
        (p.x * obstacle.width / robot.width);


        let ry =
        obstacle.y +
        (p.y * obstacle.height / robot.height);



        let rw =
        obstacle.width / robot.width;



        let rh =
        obstacle.height / robot.height;



        rx += rw * shrink;

        ry += rh * shrink;



        if(

            rx < player.x + player.width &&

            rx+rw > player.x &&

            ry < player.y + player.height &&

            ry+rh > player.y

        ){

            return true;

        }


    }


    return false;


}




// SPAWN ROBOTS

function spawnObstacle(){


    obstacles.push({


        x:canvas.width,


        y:ground+40,


        width:80,


        height:80


    });


}




// EXPLOSION

function startExplosion(){


    if(explosionPlaying)return;



    explosionPlaying=true;



    explosion.style.display="block";



    explosion.src="";

    explosion.src="explode.gif";



    setTimeout(()=>{


        explosion.style.display="none";


        gameOver=true;


        explosionPlaying=false;


    },1000);



}




// RESTART

function restart(){


    score=0;


    speed=7;


    obstacles=[];


    spawnTimer=0;



    player.y=ground;


    player.velY=0;


    player.jumping=false;



    gameOver=false;


    explosionPlaying=false;



    if(!gameRunning){

        gameLoop();

    }


}




// CONTROLS


document.addEventListener("keydown",(e)=>{


    if(gameOver){


        restart();

        return;


    }



    if(e.code==="Space" || e.code==="ArrowUp"){


        player.jump();


    }


});



document.addEventListener("mousedown",()=>{


    if(gameOver){


        restart();


    }

    else{


        player.jump();


    }


});




document.addEventListener("touchstart",()=>{


    if(gameOver){


        restart();


    }

    else{


        player.jump();


    }


});




// GAME LOOP

function gameLoop(){


    if(gameRunning)return;


    gameRunning=true;


    update();


}




function update(){


    requestAnimationFrame(update);



    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );



    // SKY


    ctx.drawImage(
        sky,
        0,
        0,
        canvas.width,
        canvas.height
    );



    // GROUND


    ctx.drawImage(
        groundImg,
        0,
        390,
        canvas.width,
        60
    );



    if(explosionPlaying){

        return;

    }



    if(!gameOver){


        score+=0.05;


        speed=7+score/100;



        spawnTimer++;



        if(spawnTimer>80){


            spawnTimer=0;


            spawnObstacle();


        }



        player.update();


        player.draw();



        for(let i=obstacles.length-1;i>=0;i--){



            let o=obstacles[i];


            o.x-=speed;



            ctx.drawImage(

                robot,

                o.x,

                o.y,

                o.width,

                o.height

            );



            if(robotCollision(player,o)){


                startExplosion();


                return;


            }



            if(o.x<-100){


                obstacles.splice(i,1);


            }


        }


    }

// SCORE TEXT

ctx.fillStyle="#3b8cff";

ctx.font="28px 'Baloo 2', Arial";

ctx.strokeStyle="white";

ctx.lineWidth=4;



ctx.strokeText(

    "Score: " + Math.floor(score),

    20,

    40

);



ctx.fillText(

    "Score: " + Math.floor(score),

    20,

    40

);





// GAME OVER SCREEN

if(gameOver){



    ctx.fillStyle="rgba(0,0,0,0.6)";


    ctx.fillRect(

        0,

        0,

        canvas.width,

        canvas.height

    );



    ctx.textAlign="center";



    ctx.fillStyle="#3b8cff";

    ctx.strokeStyle="white";

    ctx.lineWidth=5;



    ctx.font="50px 'Baloo 2', Arial";



    ctx.strokeText(

        "GAME OVER",

        canvas.width/2,

        180

    );



    ctx.fillText(

        "GAME OVER",

        canvas.width/2,

        180

    );





    ctx.font="30px 'Baloo 2', Arial";



    ctx.strokeText(

        "Score: " + Math.floor(score),

        canvas.width/2,

        240

    );



    ctx.fillText(

        "Score: " + Math.floor(score),

        canvas.width/2,

        240

    );





    ctx.font="24px 'Baloo 2', Arial";



    ctx.strokeText(

        "Press SPACE or click to restart",

        canvas.width/2,

        300

    );



    ctx.fillText(

        "Press SPACE or click to restart",

        canvas.width/2,

        300

    );



    ctx.textAlign="left";


}





}



// START WHEN ASSETS LOAD

Promise.all([


    new Promise(resolve=>run1.onload=resolve),

    new Promise(resolve=>run2.onload=resolve),

    new Promise(resolve=>jumpImg.onload=resolve),

    new Promise(resolve=>sky.onload=resolve),

    new Promise(resolve=>groundImg.onload=resolve)



])

.then(()=>{


    gameLoop();


});



</script>

</body>

</html>
