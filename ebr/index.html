<!DOCTYPE html>
<html>
<head>

<title>Eraserbot Run!</title>

<style>

html,body{
    margin:0;
    padding:0;
    overflow:hidden;
	background-color:#bcc8cc;
	text-align: center;
	color: #0007E6;
	font-family: Arial, sans-serif;
}


img.sizing {
	max-width: 100%;
	max-height: 600px;
	height: auto;
	display: block;
	margin: auto;
	}


canvas{
    display:block;
    margin:auto;
    image-rendering:pixelated;
}

#explosion{
    position:absolute;
    display:none;
    left:0;
    top:0;
    z-index:10;
    pointer-events:none;
}

</style>

</head>

<body>

<img id="explosion" src="explode.gif">

<h1>Eraserbot Run!</h1>

<canvas id="game" width="900" height="600"></canvas>
<p> How to Play: Space to jump, and to doublejump. Avoid the Eraserbots!</p>

<script>


const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

ctx.imageSmoothingEnabled=false;




// IMAGES

const run1=new Image();
const run2=new Image();
const jump=new Image();


const robot1=new Image();
const robot2=new Image();


const robotb1=new Image();
const robotb2=new Image();


const robotc1=new Image();
const robotc2=new Image();


const robotd1=new Image();
const robotd2=new Image();



const sky=new Image();
const ground=new Image();





run1.src="run1.png";
run2.src="run2.png";
jump.src="jump.png";


robot1.src="robot1.png";
robot2.src="robot2.png";


robotb1.src="robotb1.png";
robotb2.src="robotb2.png";


robotc1.src="robotc1.png";
robotc2.src="robotc2.png";


robotd1.src="robotd1.png";
robotd2.src="robotd2.png";



sky.src="sky.png";
ground.src="ground.png";



const explosion=document.getElementById("explosion");





// LANES


const GROUND=420;

const MIDDLE=270;

const TOP=120;



const gravity=0.8;

const HITBOX_SCALE=0.78;






let score=0;

let speed=7;


let gameOver=false;

let exploding=false;

let laneRobotCounter = [0,0,0];

let obstacles=[];







// SPAWN


let spawnTimer=0;

let spawnTarget=80;



let robotsSpawned=0;



let slowLane=
Math.floor(Math.random()*3);



let nextLaneChange=
Math.floor(Math.random()*21)+20;






// ROBOT D RANDOM SYSTEM


let laneRobotCount=[0,0,0];


let laneDThreshold=[

Math.floor(Math.random()*11)+20,

Math.floor(Math.random()*11)+20,

Math.floor(Math.random()*11)+20

];


let laneDCheckCount=[

Math.floor(Math.random()*3)+5,

Math.floor(Math.random()*3)+5,

Math.floor(Math.random()*3)+5

];



let laneDChance=[

false,

false,

false

];







// ANIMATION


let playerFrame=0;
let playerTimer=0;


let robotFrame=0;
let robotTimer=0;


let robotBFrame=0;
let robotBTimer=0;


let robotCFrame=0;
let robotCTimer=0;


let robotDFrame=0;
let robotDTimer=0;






// HITBOX STORAGE


const playerCircles={

run1:null,
run2:null,
jump:null

};



const robotCircles={

robot1:null,
robot2:null

};



const robotBCircles={

robotb1:null,
robotb2:null

};



const robotCCircles={

robotc1:null,
robotc2:null

};



const robotDCircles={

robotd1:null,
robotd2:null

};







function makeCircle(image){


return {

radius:
Math.min(
image.width,
image.height
)
*
HITBOX_SCALE
/
2

};


}






// PLAYER


const player={


x:120,

y:GROUND,


width:120,

height:120,


velocity:0,


jumps:0,



jump(){


if(this.jumps<2){


this.velocity=-18;


this.jumps++;


}


},




update(){


this.velocity+=gravity;


this.y+=this.velocity;



if(this.y>=GROUND){


this.y=GROUND;


this.velocity=0;


this.jumps=0;


}



playerTimer++;



if(playerTimer>8){


playerTimer=0;


playerFrame++;


if(playerFrame>1)

playerFrame=0;


}



},




draw(){


let image;


if(this.jumps>0)

image=jump;

else

image=
playerFrame===0?
run1:
run2;



ctx.save();


ctx.translate(
this.x+this.width,
this.y
);


ctx.scale(-1,1);



ctx.drawImage(

image,

0,

0,

this.width,

this.height

);



ctx.restore();



}


};


function setupCircles(){


playerCircles.run1=makeCircle(run1);

playerCircles.run2=makeCircle(run2);

playerCircles.jump=makeCircle(jump);




robotCircles.robot1=makeCircle(robot1);

robotCircles.robot2=makeCircle(robot2);



robotBCircles.robotb1=makeCircle(robotb1);

robotBCircles.robotb2=makeCircle(robotb2);



robotCCircles.robotc1=makeCircle(robotc1);

robotCCircles.robotc2=makeCircle(robotc2);



robotDCircles.robotd1=makeCircle(robotd1);

robotDCircles.robotd2=makeCircle(robotd2);



}








function getPlayerCircle(){


let circle;


if(player.jumps>0)

circle=playerCircles.jump;


else if(playerFrame===0)

circle=playerCircles.run1;


else

circle=playerCircles.run2;




return {

x:player.x+(player.width/2),

y:player.y+(player.height/2),

radius:
circle.radius*
(player.width/run1.width)

};


}







function getRobotCircle(robot){


let circle=
robotFrame===0?
robotCircles.robot1:
robotCircles.robot2;



return {

x:robot.x+(robot.width/2),

y:robot.y+(robot.height/2),

radius:
circle.radius*
(robot.width/robot1.width)

};


}







function getRobotBCircle(robot){


let circle=
robotBFrame===0?
robotBCircles.robotb1:
robotBCircles.robotb2;



return {

x:robot.x+(robot.width/2),

y:robot.y+(robot.height/2),

radius:
circle.radius*
(robot.width/robotb1.width)

};


}







function getRobotCCircle(robot){


let circle=
robotCFrame===0?
robotCCircles.robotc1:
robotCCircles.robotc2;



return {

x:robot.x+(robot.width/2),

y:robot.y+(robot.height/2),

radius:
circle.radius*
(robot.width/robotc1.width)

};


}







function getRobotDCircle(robot){


let circle=
robotDFrame===0?
robotDCircles.robotd1:
robotDCircles.robotd2;



return {

x:robot.x+(robot.width/2),

y:robot.y+(robot.height/2),

radius:
circle.radius*
(robot.width/robotd1.width)

};


}







function circleCollision(a,b){


let dx=a.x-b.x;

let dy=a.y-b.y;



return Math.sqrt(
dx*dx+dy*dy
)
<
a.radius+b.radius;


}









function laneOccupied(lane){


for(let robot of obstacles){


if(
robot.lane===lane &&
robot.x>canvas.width-140
)

return true;


}


return false;


}








function chooseRobotType(lane){



laneRobotCount[lane]++;




if(
laneRobotCount[lane]>=laneDThreshold[lane]
){



laneRobotCount[lane]=0;



laneDThreshold[lane]=
Math.floor(Math.random()*11)+20;



laneDCheckCount[lane]=
Math.floor(Math.random()*3)+5;



laneDChance[lane]=
true;


}






if(laneDChance[lane]){



laneDCheckCount[lane]--;



if(laneDCheckCount[lane]<=0){


laneDChance[lane]=false;



if(Math.random()<10)


return "d";



}


}




return "normal";


}








function spawnColumn(){



let lanes=[0,1,2];



let amount =
Math.random()<0.7 ?
1 :
2;



while(lanes.length>amount){


let remove=
Math.floor(Math.random()*lanes.length);


lanes.splice(remove,1);


}






for(let lane of lanes){



if(laneOccupied(lane))

continue;




laneRobotCounter[lane]++;

let type="normal";


if(laneRobotCounter[lane] >= 2){

    laneRobotCounter[lane]=0;


    if(Math.random() < 0.6){

        type="d";

    }

}



let y;



if(lane===0)

y=GROUND+20;


if(lane===1)

y=MIDDLE;


if(lane===2)

y=TOP;






obstacles.push({


type:type,


lane:lane,


x:canvas.width,


y:y,


width:90,


height:90


});



}





robotsSpawned++;




if(robotsSpawned>=nextLaneChange){



robotsSpawned=0;



slowLane=
Math.floor(Math.random()*3);



nextLaneChange=
Math.floor(Math.random()*21)+20;


}





spawnTarget=
Math.floor(Math.random()*50)+70;



}









function startExplosion(){


if(exploding)

return;



exploding=true;



explosion.style.display="block";


explosion.style.width=
canvas.width+"px";


explosion.style.height=
canvas.height+"px";




setTimeout(()=>{


explosion.style.display="none";


exploding=false;


gameOver=true;


},1000);



}







function restart(){


score=0;


speed=7;


obstacles=[];



spawnTimer=0;


robotsSpawned=0;



laneRobotCount=[0,0,0];



player.y=GROUND;

player.velocity=0;

player.jumps=0;



gameOver=false;



}







document.addEventListener("keydown",(e)=>{


if(gameOver){

restart();

return;

}


if(
e.code==="Space" ||
e.code==="ArrowUp"
)

player.jump();



});





document.addEventListener("mousedown",()=>{


if(gameOver)

restart();

else

player.jump();


});


function update(){


requestAnimationFrame(update);



ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);



ctx.drawImage(
sky,
0,
0,
canvas.width,
canvas.height
);



ctx.drawImage(
ground,
0,
540,
canvas.width,
60
);






if(exploding)

return;







if(!gameOver){



score+=0.05;


speed=10+(score/80);




spawnTimer++;



if(spawnTimer>spawnTarget){


spawnTimer=0;


spawnColumn();


}






player.update();


player.draw();







robotTimer++;


if(robotTimer>8){


robotTimer=0;


robotFrame++;


if(robotFrame>1)

robotFrame=0;


}






robotBTimer++;


if(robotBTimer>8){


robotBTimer=0;


robotBFrame++;


if(robotBFrame>1)

robotBFrame=0;


}






robotCTimer++;


if(robotCTimer>8){


robotCTimer=0;


robotCFrame++;


if(robotCFrame>1)

robotCFrame=0;


}






robotDTimer++;


if(robotDTimer>6){


robotDTimer=0;


robotDFrame++;


if(robotDFrame>1)

robotDFrame=0;


}









for(
let i=obstacles.length-1;
i>=0;
i--
){



let robot=obstacles[i];





let robotSpeed=speed;



if(robot.type==="d")


robotSpeed=speed+4;



robot.x-=robotSpeed;








if(robot.type==="normal" && robot.lane===0){


ctx.drawImage(

robotFrame===0?
robot1:
robot2,

robot.x,

robot.y,

robot.width,

robot.height

);



if(circleCollision(
getPlayerCircle(),
getRobotCircle(robot)
)){


startExplosion();

return;


}



}







if(robot.type==="normal" && robot.lane===1){


ctx.drawImage(

robotBFrame===0?
robotb1:
robotb2,

robot.x,

robot.y,

robot.width,

robot.height

);



if(circleCollision(
getPlayerCircle(),
getRobotBCircle(robot)
)){


startExplosion();

return;


}



}







if(robot.type==="normal" && robot.lane===2){


ctx.drawImage(

robotCFrame===0?
robotc1:
robotc2,

robot.x,

robot.y,

robot.width,

robot.height

);



if(circleCollision(
getPlayerCircle(),
getRobotCCircle(robot)
)){


startExplosion();

return;


}



}








if(robot.type==="d"){



let image;


if(robot.lane===0)

image=
robotDFrame===0?
robotd1:
robotd2;



if(robot.lane===1)

image=
robotDFrame===0?
robotd1:
robotd2;



if(robot.lane===2)

image=
robotDFrame===0?
robotd1:
robotd2;





ctx.drawImage(

image,

robot.x,

robot.y,

robot.width,

robot.height

);





if(circleCollision(
getPlayerCircle(),
getRobotDCircle(robot)
)){


startExplosion();

return;


}



}








if(robot.x<-120)


obstacles.splice(i,1);



}



}




drawUI();



}









function drawUI(){


ctx.font=
"32px Arial Rounded MT Bold, Arial";


ctx.fillStyle="#3b8cff";



ctx.fillText(

"Score: "+Math.floor(score),

20,

40

);







if(gameOver){



ctx.fillStyle=
"rgba(0,0,0,0.6)";



ctx.fillRect(

0,

0,

canvas.width,

canvas.height

);





ctx.textAlign="center";



ctx.font=
"60px Arial Rounded MT Bold, Arial";


ctx.fillStyle="#3b8cff";



ctx.fillText(

"GAME OVER",

canvas.width/2,

200

);





ctx.font=
"24px Arial Rounded MT Bold, Arial";



ctx.fillText(

"Press SPACE or click to restart",

canvas.width/2,

300

);



ctx.textAlign="left";



}


}








let loaded=0;



function imageLoaded(){


loaded++;



if(loaded===13){


setupCircles();


update();


}



}






run1.onload=imageLoaded;

run2.onload=imageLoaded;

jump.onload=imageLoaded;


robot1.onload=imageLoaded;

robot2.onload=imageLoaded;


robotb1.onload=imageLoaded;

robotb2.onload=imageLoaded;


robotc1.onload=imageLoaded;

robotc2.onload=imageLoaded;


robotd1.onload=imageLoaded;

robotd2.onload=imageLoaded;


sky.onload=imageLoaded;

ground.onload=imageLoaded;



</script>

</body>

</html>
