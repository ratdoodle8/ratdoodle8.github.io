<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Character Arc</title>

    <style>
        body {
            background-color: #bcc8cc;
            color: #0007E6;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 30px 15px;
        }

        h1,
        h2,
        p {
            color: #0007E6;
        }

        .arc-description {
            width: 90%;
            max-width: 700px;
            margin: 10px auto 30px;
            line-height: 1.5;
        }

        .image-entry {
            margin: 35px auto;
        }

        .image-title {
            margin: 0 auto 10px;
        }

        .image-paragraph {
            width: 90%;
            max-width: 700px;
            margin: 0 auto 15px;
            line-height: 1.5;
        }

        .arc-image {
            width: 70%;
            max-width: 420px;
            height: auto;
            display: block;
            margin: 10px auto 30px;
        }

        .back-button {
            display: inline-block;
            background-color: white;
            color: #0007E6;
            text-decoration: none;
            padding: 14px 24px;
            margin: 30px auto;
            border-radius: 25px;
        }

        .back-button:hover {
            transform: scale(1.05);
        }

        .error-message {
            width: 90%;
            max-width: 700px;
            margin: 20px auto;
        }
    </style>
</head>

<body>

    <main id="page">
        <p>Loading...</p>
    </main>

    <script>
        const pathParts = window.location.pathname
            .split("/")
            .filter(Boolean);

        const pFolderIndex = pathParts.lastIndexOf("p");

        const characterID =
            pFolderIndex > 0
                ? pathParts[pFolderIndex - 1]
                : "";

        function hasValue(value) {
            return (
                value !== undefined &&
                value !== null &&
                String(value).trim() !== ""
            );
        }

        function escapeHTML(value) {
            const element = document.createElement("div");
            element.textContent = String(value);
            return element.innerHTML;
        }

        function getImageURL(imageNumber) {
            return new URL(
                `ARCIMAGE/${imageNumber}.png`,
                document.baseURI
            ).href;
        }

        function imageExists(imageURL) {
            return new Promise(function (resolve) {
                const image = new Image();

                image.onload = function () {
                    resolve(true);
                };

                image.onerror = function () {
                    resolve(false);
                };

                image.src = imageURL;
            });
        }

        async function loadImages(arc) {
            const imageContainer =
                document.getElementById("arc-images");

            let imageNumber = 1;

            while (true) {
                const imageURL = getImageURL(imageNumber);

                const found = await imageExists(imageURL);

                if (!found) {
                    break;
                }

                const imageInformation =
                    arc.images &&
                    arc.images[String(imageNumber)]
                        ? arc.images[String(imageNumber)]
                        : {};

                const imageEntry =
                    document.createElement("section");

                imageEntry.className = "image-entry";

                if (hasValue(imageInformation.title)) {
                    const title =
                        document.createElement("h2");

                    title.className = "image-title";

                    title.textContent =
                        imageInformation.title;

                    imageEntry.appendChild(title);
                }

                if (hasValue(imageInformation.paragraph)) {
                    const paragraph =
                        document.createElement("p");

                    paragraph.className =
                        "image-paragraph";

                    paragraph.textContent =
                        imageInformation.paragraph;

                    imageEntry.appendChild(paragraph);
                }

                const image =
                    document.createElement("img");

                image.className = "arc-image";
                image.src = imageURL;

                image.alt =
                    hasValue(imageInformation.title)
                        ? imageInformation.title
                        : `${characterID} image ${imageNumber}`;

                imageEntry.appendChild(image);

                imageContainer.appendChild(imageEntry);

                imageNumber++;
            }
        }

        async function loadArcPage() {
            const page =
                document.getElementById("page");

            if (!characterID) {
                page.innerHTML = `
                    <h1>Arc page unavailable</h1>

                    <p class="error-message">
                        The character folder could not be detected.
                    </p>
                `;

                return;
            }

            try {
                const jsonURL = new URL(
                    "../../shared/arcinfo.json",
                    document.baseURI
                ).href;

                const response = await fetch(jsonURL);

                if (!response.ok) {
                    throw new Error(
                        `Could not load arcinfo.json: ${response.status}`
                    );
                }

                const allArcData =
                    await response.json();

                const arc =
                    allArcData[characterID] || {};

                const pageTitle =
                    hasValue(arc.title)
                        ? arc.title
                        : `${characterID} Arc`;

                document.title = pageTitle;

                page.innerHTML = "";

                if (hasValue(arc.title)) {
                    const title =
                        document.createElement("h1");

                    title.textContent = arc.title;

                    page.appendChild(title);
                }

                if (hasValue(arc.description)) {
                    const description =
                        document.createElement("p");

                    description.className =
                        "arc-description";

                    description.textContent =
                        arc.description;

                    page.appendChild(description);
                }

                const imageContainer =
                    document.createElement("section");

                imageContainer.id = "arc-images";

                page.appendChild(imageContainer);

                const backButton =
                    document.createElement("a");

                backButton.className = "back-button";
                backButton.href = "../";
                backButton.textContent =
                    "Back to Character";

                page.appendChild(backButton);

                await loadImages(arc);
            } catch (error) {
                console.error(error);

                page.innerHTML = `
                    <h1>Arc page unavailable</h1>

                    <p class="error-message">
                        The arc information could not be loaded.
                    </p>

                    <a class="back-button" href="../">
                        Back to Character
                    </a>
                `;
            }
        }

        loadArcPage();
    </script>

</body>

</html>
