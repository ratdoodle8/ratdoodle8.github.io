<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Robot Runner</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@700&display=swap');

html,body{
    margin:0;
    padding:0;
    overflow:hidden;
    background:black;
}

canvas{
    display:block;
    margin:auto;
    image-rendering:pixelated;
}

#explosion{
    position:absolute;
    left:0;
    top:0;
    width:900px;
    height:450px;
    display:none;
    z-index:10;
    pointer-events:none;
    image-rendering:pixelated;
}

</style>

</head>

<body>

<img id="explosion" src="explode.gif">

<canvas id="game" width="900" height="450"></canvas>


<script>


const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

ctx.imageSmoothingEnabled=false;



// IMAGES

const run1=new Image();
run1.src="run1.png";

const run2=new Image();
run2.src="run2.png";

const jumpImg=new Image();
jumpImg.src="jump.png";


const robot1=new Image();
robot1.src="robot1.png";


const robot2=new Image();
robot2.src="robot2.png";


const sky=new Image();
sky.src="sky.png";


const groundImg=new Image();
groundImg.src="ground.png";


const explosion=document.getElementById("explosion");




// GAME VARIABLES

const gravity=0.8;

const ground=310;


let score=0;

let speed=7;


let gameOver=false;

let explosionPlaying=false;


let obstacles=[];

let spawnTimer=0;


let gameRunning=false;



// ANIMATION

let robotFrame=0;

let robotFrameTimer=0;



// ALPHA HITBOX STORAGE

let playerHitboxes={

    run1:null,

    run2:null,

    jump:null

};


let robotHitboxes={

    robot1:null,

    robot2:null

};




// FIND ALPHA BOUNDS

function getAlphaBounds(img){


    let temp=document.createElement("canvas");

    temp.width=img.width;

    temp.height=img.height;


    let tctx=temp.getContext("2d");


    tctx.drawImage(img,0,0);



    let pixels=tctx.getImageData(
        0,
        0,
        img.width,
        img.height
    ).data;



    let minX=img.width;
    let minY=img.height;

    let maxX=0;
    let maxY=0;



    for(let y=0;y<img.height;y++){

        for(let x=0;x<img.width;x++){


            let alpha=pixels[
                (y*img.width+x)*4+3
            ];


            if(alpha>10){


                if(x<minX)minX=x;

                if(x>maxX)maxX=x;

                if(y<minY)minY=y;

                if(y>maxY)maxY=y;


            }


        }

    }



    return {

        x:minX,

        y:minY,

        width:maxX-minX,

        height:maxY-minY

    };


}





// PLAYER

const player={


    x:120,

    y:ground,


    width:120,

    height:120,


    velY:0,

    jumping:false,


    frame:0,

    frameTimer:0,



    draw(){


        let img;


        if(this.jumping){

            img=jumpImg;

        }
        else{

            img=this.frame===0 ? run1 : run2;

        }



        ctx.save();



        ctx.translate(

            this.x+this.width,

            this.y

        );


        ctx.scale(-1,1);



        ctx.drawImage(

            img,

            0,

            0,

            this.width,

            this.height

        );



        ctx.restore();


    },



    update(){


        if(this.jumping){


            this.velY+=gravity;


            this.y+=this.velY;



            if(this.y>=ground){


                this.y=ground;

                this.velY=0;

                this.jumping=false;


            }


        }

        else{


            this.frameTimer++;


            if(this.frameTimer>8){


                this.frameTimer=0;


                this.frame=this.frame===0?1:0;


            }


        }


    },



    jump(){


        if(!this.jumping){


            this.jumping=true;


            this.velY=-18;


        }


    }


};

// LOAD ALPHA HITBOXES AFTER IMAGES LOAD

function loadHitboxes(){


    playerHitboxes.run1=getAlphaBounds(run1);

    playerHitboxes.run2=getAlphaBounds(run2);

    playerHitboxes.jump=getAlphaBounds(jumpImg);



    robotHitboxes.robot1=getAlphaBounds(robot1);

    robotHitboxes.robot2=getAlphaBounds(robot2);


}





// GET CURRENT PLAYER HITBOX

function getPlayerHitbox(){


    let box;


    if(player.jumping){

        box=playerHitboxes.jump;

    }

    else{

        box=
        player.frame===0 ?
        playerHitboxes.run1 :
        playerHitboxes.run2;

    }



    let scaleX=player.width /
    (player.jumping ? jumpImg.width : run1.width);


    let scaleY=player.height /
    (player.jumping ? jumpImg.height : run1.height);



    return {

        x:player.x+(box.x*scaleX),

        y:player.y+(box.y*scaleY),

        width:box.width*scaleX,

        height:box.height*scaleY

    };


}





// ROBOT HITBOX

function getRobotHitbox(obstacle){


    let box =
    robotFrame===0 ?
    robotHitboxes.robot1 :
    robotHitboxes.robot2;



    let scaleX=obstacle.width / robot1.width;

    let scaleY=obstacle.height / robot1.height;



    return {


        x:obstacle.x+(box.x*scaleX),

        y:obstacle.y+(box.y*scaleY),


        width:box.width*scaleX,

        height:box.height*scaleY


    };


}





// COLLISION

function checkCollision(player,obstacle){

    if(
        !playerHitboxes.run1 ||
        !playerHitboxes.run2 ||
        !playerHitboxes.jump ||
        !robotHitboxes.robot1 ||
        !robotHitboxes.robot2
    ){
        return false;
    }


    let p=getPlayerHitbox();

    let r=getRobotHitbox(obstacle);



    return (

        p.x < r.x+r.width &&

        p.x+p.width > r.x &&

        p.y < r.y+r.height &&

        p.y+p.height > r.y

    );


}






// SPAWN ROBOT

function spawnObstacle(){


    obstacles.push({


        x:canvas.width,

        y:ground+40,


        width:80,

        height:80


    });


}





// EXPLOSION

function startExplosion(){


    if(explosionPlaying)return;



    explosionPlaying=true;


    explosion.style.display="block";



    explosion.src="";

    explosion.src="explode.gif";



    setTimeout(()=>{


        explosion.style.display="none";


        gameOver=true;


        explosionPlaying=false;



    },1000);



}





// RESTART

function restart(){


    score=0;

    speed=7;


    obstacles=[];

    spawnTimer=0;



    player.y=ground;

    player.velY=0;

    player.jumping=false;



    gameOver=false;

    explosionPlaying=false;



    if(!gameRunning){

        gameLoop();

    }


}





// CONTROLS

document.addEventListener("keydown",(e)=>{


    if(gameOver){

        restart();

        return;

    }



    if(e.code==="Space" || e.code==="ArrowUp"){

        player.jump();

    }


});





document.addEventListener("mousedown",()=>{


    if(gameOver){

        restart();

    }

    else{

        player.jump();

    }


});





document.addEventListener("touchstart",()=>{


    if(gameOver){

        restart();

    }

    else{

        player.jump();

    }


});






// GAME LOOP

function gameLoop(){


    if(gameRunning)return;


    gameRunning=true;


    update();


}





function update(){


    requestAnimationFrame(update);



    ctx.clearRect(

        0,

        0,

        canvas.width,

        canvas.height

    );



    ctx.drawImage(

        sky,

        0,

        0,

        canvas.width,

        canvas.height

    );



    ctx.drawImage(

        groundImg,

        0,

        390,

        canvas.width,

        60

    );



    if(explosionPlaying){

        return;

    }



    if(!gameOver){


        score+=0.05;


        speed=7+score/100;



        spawnTimer++;



        if(spawnTimer>80){


            spawnTimer=0;


            spawnObstacle();


        }




        player.update();


        player.draw();



        robotFrameTimer++;


        if(robotFrameTimer>8){


            robotFrameTimer=0;


            robotFrame=robotFrame===0?1:0;


        }





        for(let i=obstacles.length-1;i>=0;i--){


            let o=obstacles[i];



            o.x-=speed;



            ctx.drawImage(

                robotFrame===0 ?
                robot1 :
                robot2,

                o.x,

                o.y,

                o.width,

                o.height

            );



            if(checkCollision(player,o)){


                startExplosion();


                return;


            }




            if(o.x<-100){


                obstacles.splice(i,1);


            }


        }


    }

// SCORE DISPLAY

ctx.fillStyle="#3b8cff";

ctx.strokeStyle="white";

ctx.lineWidth=4;

ctx.font="28px 'Baloo 2', Arial";


ctx.strokeText(
    "Score: " + Math.floor(score),
    20,
    40
);


ctx.fillText(
    "Score: " + Math.floor(score),
    20,
    40
);





// GAME OVER SCREEN

if(gameOver){


    ctx.fillStyle="rgba(0,0,0,0.6)";


    ctx.fillRect(

        0,

        0,

        canvas.width,

        canvas.height

    );



    ctx.textAlign="center";



    ctx.fillStyle="#3b8cff";

    ctx.strokeStyle="white";

    ctx.lineWidth=5;



    ctx.font="50px 'Baloo 2', Arial";



    ctx.strokeText(

        "GAME OVER",

        canvas.width/2,

        180

    );



    ctx.fillText(

        "GAME OVER",

        canvas.width/2,

        180

    );





    ctx.font="30px 'Baloo 2', Arial";



    ctx.strokeText(

        "Score: " + Math.floor(score),

        canvas.width/2,

        240

    );



    ctx.fillText(

        "Score: " + Math.floor(score),

        canvas.width/2,

        240

    );





    ctx.font="24px 'Baloo 2', Arial";



    ctx.strokeText(

        "Press SPACE or click to restart",

        canvas.width/2,

        300

    );



    ctx.fillText(

        "Press SPACE or click to restart",

        canvas.width/2,

        300

    );



    ctx.textAlign="left";


}





}



// START GAME AFTER ALL IMAGES LOAD

Promise.all([


    new Promise(resolve=>run1.onload=resolve),

    new Promise(resolve=>run2.onload=resolve),

    new Promise(resolve=>jumpImg.onload=resolve),

    new Promise(resolve=>robot1.onload=resolve),

    new Promise(resolve=>robot2.onload=resolve),

    new Promise(resolve=>sky.onload=resolve),

    new Promise(resolve=>groundImg.onload=resolve)


])

.then(()=>{

    loadHitboxes();

    gameRunning = false;

    gameLoop();

});


});



</script>

</body>

</html>
