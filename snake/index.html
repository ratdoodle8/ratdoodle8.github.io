<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Robot Runner</title>

<style>

html, body {
    margin:0;
    padding:0;
    overflow:hidden;
    background:black;
}

canvas {
    display:block;
    margin:auto;
    image-rendering:pixelated;
}

#explosion {

    position:absolute;

    left:0;
    top:0;

    width:900px;
    height:450px;

    display:none;

    z-index:10;

    pointer-events:none;

    image-rendering:pixelated;
}

</style>

</head>

<body>


<img id="explosion" src="explode.gif">


<canvas id="game" width="900" height="450"></canvas>



<script>


const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

ctx.imageSmoothingEnabled = false;


// IMAGES

const run1 = new Image();
run1.src="run1.png";


const run2 = new Image();
run2.src="run2.png";


const jumpImg = new Image();
jumpImg.src="jump.png";


const robot = new Image();
robot.src="robot.png";


const sky = new Image();
sky.src="sky.png";


const groundImg = new Image();
groundImg.src="ground.png";



// EXPLOSION

const explosion = document.getElementById("explosion");



// GAME VARIABLES

const gravity = 0.8;

const ground = 310;


let score = 0;

let speed = 7;

let gameOver = false;

let explosionPlaying = false;


let obstacles = [];

let spawnTimer = 0;


// prevents multiple game loops

let gameRunning = false;



// PLAYER

const player = {

    x:120,

    y:ground,

    width:120,

    height:120,


    velY:0,

    jumping:false,


    frame:0,

    frameTimer:0,



    draw(){


        let img;


        if(this.jumping){

            img=jumpImg;

        }

        else{

            img=this.frame===0 ? run1 : run2;

        }



        ctx.save();


        ctx.imageSmoothingEnabled=false;



        // flip image

        ctx.translate(
            this.x + this.width,
            this.y
        );


        ctx.scale(-1,1);



        ctx.drawImage(

            img,

            0,

            0,

            this.width,

            this.height

        );



        ctx.restore();


    },



    update(){


        if(this.jumping){


            this.velY += gravity;


            this.y += this.velY;



            if(this.y >= ground){


                this.y = ground;

                this.velY = 0;

                this.jumping = false;


            }


        }


        else{


            this.frameTimer++;



            if(this.frameTimer > 8){


                this.frameTimer=0;


                this.frame =
                this.frame===0 ? 1 : 0;


            }


        }


    },



    jump(){


        if(!this.jumping){


            this.jumping=true;

            this.velY=-16;


        }


    }


};

// SPAWN ROBOTS

function spawnObstacle(){

    obstacles.push({

        x:canvas.width,

        y:ground + 40,

        width:80,

        height:80

    });

}



// COLLISION

function checkCollision(player, obstacle){

    return (

        player.x < obstacle.x + obstacle.width &&

        player.x + player.width > obstacle.x &&

        player.y < obstacle.y + obstacle.height &&

        player.y + player.height > obstacle.y

    );

}



// EXPLOSION

function startExplosion(){


    if(explosionPlaying) return;



    explosionPlaying=true;



    explosion.style.display="block";



    // restart gif animation

    explosion.src="";

    explosion.src="explode.gif";



    setTimeout(()=>{


        explosion.style.display="none";


        gameOver=true;


        explosionPlaying=false;



    },1000);



}




// RESTART

function restart(){


    score=0;

    speed=7;


    obstacles=[];


    spawnTimer=0;



    player.y=ground;

    player.velY=0;

    player.jumping=false;



    gameOver=false;

    explosionPlaying=false;


    // restart without creating extra loops

    if(!gameRunning){

        gameLoop();

    }


}



// CONTROLS


document.addEventListener("keydown",(e)=>{


    if(gameOver){


        restart();

        return;


    }



    if(e.code==="Space" || e.code==="ArrowUp"){


        player.jump();


    }


});




document.addEventListener("mousedown",()=>{


    if(gameOver){


        restart();


    }

    else{


        player.jump();


    }


});





document.addEventListener("touchstart",()=>{


    if(gameOver){


        restart();


    }

    else{


        player.jump();


    }


});





// MAIN LOOP


function gameLoop(){


    if(gameRunning) return;



    gameRunning=true;



    update();


}



function update(){


    requestAnimationFrame(update);



    ctx.clearRect(

        0,

        0,

        canvas.width,

        canvas.height

    );





    // SKY IMAGE


    ctx.drawImage(

        sky,

        0,

        0,

        canvas.width,

        canvas.height

    );





    // GROUND IMAGE


    ctx.drawImage(

        groundImg,

        0,

        390,

        canvas.width,

        60

    );





    // freeze everything during explosion


    if(explosionPlaying){

        return;

    }





    if(!gameOver){



        score += .05;



        speed = 7 + score / 100;





        spawnTimer++;




        if(spawnTimer > 80){


            spawnTimer=0;


            spawnObstacle();


        }





        player.update();


        player.draw();





        for(let i=obstacles.length-1;i>=0;i--){



            let o=obstacles[i];



            o.x -= speed;





            ctx.drawImage(

                robot,

                o.x,

                o.y,

                o.width,

                o.height

            );





            if(checkCollision(player,o)){



                startExplosion();


                return;


            }





            if(o.x < -100){


                obstacles.splice(i,1);


            }


        }



    }

// SCORE

ctx.fillStyle="black";

ctx.font="28px Arial";

ctx.fillText(
    "Score: " + Math.floor(score),
    20,
    40
);




// GAME OVER SCREEN

if(gameOver){


    ctx.fillStyle="rgba(0,0,0,0.6)";

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );



    ctx.fillStyle="white";

    ctx.textAlign="center";



    ctx.font="50px Arial";

    ctx.fillText(
        "GAME OVER",
        canvas.width/2,
        180
    );



    ctx.font="30px Arial";

    ctx.fillText(
        "Score: " + Math.floor(score),
        canvas.width/2,
        240
    );



    ctx.font="24px Arial";

    ctx.fillText(
        "Press SPACE or click to restart",
        canvas.width/2,
        300
    );


    ctx.textAlign="left";


}



}



// START GAME AFTER IMAGES LOAD

Promise.all([


    new Promise(resolve=>run1.onload=resolve),

    new Promise(resolve=>run2.onload=resolve),

    new Promise(resolve=>jumpImg.onload=resolve),

    new Promise(resolve=>robot.onload=resolve),

    new Promise(resolve=>sky.onload=resolve),

    new Promise(resolve=>groundImg.onload=resolve)


])

.then(()=>{


    gameLoop();


});



</script>

</body>

</html>
