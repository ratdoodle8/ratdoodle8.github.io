<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Character Archive</title>

    <style>
        body {
            background-color: #bcc8cc;
            color: #0007E6;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 30px 15px;
        }

        h1,
        h2,
        p {
            color: #0007E6;
        }

        .archive-description {
            width: 90%;
            max-width: 700px;
            margin: 10px auto 30px;
            line-height: 1.5;
        }

        .image-entry {
            margin: 35px auto;
        }

        .image-title {
            margin: 0 auto 10px;
        }

        .image-paragraph {
            width: 90%;
            max-width: 700px;
            margin: 0 auto 15px;
            line-height: 1.5;
        }

        .archive-image {
            width: 70%;
            height: auto;
            display: block;
            margin: 10px auto 30px;
        }

        .back-button {
            display: inline-block;
            background-color: white;
            color: #0007E6;
            text-decoration: none;
            padding: 14px 24px;
            margin: 30px auto;
            border-radius: 25px;
        }

        .back-button:hover {
            transform: scale(1.05);
        }

        .error-message {
            width: 90%;
            max-width: 700px;
            margin: 20px auto;
        }
    </style>
</head>

<body>

    <main id="page">
        <p>Loading...</p>
    </main>

    <script>
        const pathParts = window.location.pathname
            .split("/")
            .filter(Boolean);

        const pFolderIndex = pathParts.lastIndexOf("p");

        const characterID =
            pFolderIndex > 0
                ? pathParts[pFolderIndex - 1]
                : "";

        function hasValue(value) {
            return (
                value !== undefined &&
                value !== null &&
                String(value).trim() !== ""
            );
        }

        function createImageEntry(imageNumber, imageInformation) {
            const imageEntry =
                document.createElement("section");

            imageEntry.className = "image-entry";

            if (hasValue(imageInformation.title)) {
                const title =
                    document.createElement("h2");

                title.className = "image-title";
                title.textContent =
                    imageInformation.title;

                imageEntry.appendChild(title);
            }

            if (hasValue(imageInformation.paragraph)) {
                const paragraph =
                    document.createElement("p");

                paragraph.className =
                    "image-paragraph";

                paragraph.textContent =
                    imageInformation.paragraph;

                imageEntry.appendChild(paragraph);
            }

            const image =
                document.createElement("img");

            image.className = "archive-image";

            image.src = new URL(
                `../../shared/ARCIMAGE/${imageNumber}.png`,
                document.baseURI
            ).href;

            image.alt =
                hasValue(imageInformation.title)
                    ? imageInformation.title
                    : `${characterID} archive image ${imageNumber}`;

            imageEntry.appendChild(image);

            return imageEntry;
        }

        async function loadArchivePage() {
            const page =
                document.getElementById("page");

            if (!characterID) {
                page.innerHTML = `
                    <h1>Archive unavailable</h1>

                    <p class="error-message">
                        The character folder could not be detected.
                    </p>
                `;

                return;
            }

            try {
                const jsonURL = new URL(
                    "../../shared/arcinfo.json",
                    document.baseURI
                ).href;

                const response =
                    await fetch(jsonURL);

                if (!response.ok) {
                    throw new Error(
                        `Could not load arcinfo.json: ${response.status}`
                    );
                }

                const archiveData =
                    await response.json();

                const characterArchive =
                    archiveData[characterID] || {};

                const pageTitle =
                    hasValue(characterArchive.title)
                        ? characterArchive.title
                        : `${characterID} Archive`;

                document.title = pageTitle;

                page.innerHTML = "";

                const title =
                    document.createElement("h1");

                title.textContent = pageTitle;

                page.appendChild(title);

                if (
                    hasValue(characterArchive.description)
                ) {
                    const description =
                        document.createElement("p");

                    description.className =
                        "archive-description";

                    description.textContent =
                        characterArchive.description;

                    page.appendChild(description);
                }

                const imageContainer =
                    document.createElement("section");

                imageContainer.id = "archive-images";

                page.appendChild(imageContainer);

                const allImages =
                    archiveData.images || {};

                const imageNumbers =
                    Object.keys(allImages).sort(
                        function (a, b) {
                            return Number(a) - Number(b);
                        }
                    );

                imageNumbers.forEach(
                    function (imageNumber) {
                        const imageInformation =
                            allImages[imageNumber];

                        const tags =
                            Array.isArray(
                                imageInformation.tags
                            )
                                ? imageInformation.tags
                                : [];

                        if (
                            !tags.includes(characterID)
                        ) {
                            return;
                        }

                        const imageEntry =
                            createImageEntry(
                                imageNumber,
                                imageInformation
                            );

                        imageContainer.appendChild(
                            imageEntry
                        );
                    }
                );

                const backButton =
                    document.createElement("a");

                backButton.className =
                    "back-button";

                backButton.href = "../";

                backButton.textContent =
                    "Back to Character";

                page.appendChild(backButton);
            } catch (error) {
                console.error(error);

                page.innerHTML = `
                    <h1>Archive unavailable</h1>

                    <p class="error-message">
                        The archive information could not be loaded.
                    </p>

                    <a class="back-button" href="../">
                        Back to Character
                    </a>
                `;
            }
        }

        loadArchivePage();
    </script>

</body>

</html>
